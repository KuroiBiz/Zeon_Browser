<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zeon Browser</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.view{
width:100%;
height:calc(100vh - 90px);
border:none;
}

.tab{
padding:6px 12px;
background:#1f2937;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.tab.active{
background:#059669;
}
</style>

</head>

<body class="bg-gray-900 text-white">

<div class="flex flex-col h-screen">

<!-- Top Bar -->
<div class="p-2 bg-gray-800 flex items-center gap-2">

<button onclick="goBack()" class="px-2 py-1 bg-gray-700 rounded">←</button>
<button onclick="goForward()" class="px-2 py-1 bg-gray-700 rounded">→</button>
<button onclick="reloadTab()" class="px-2 py-1 bg-gray-700 rounded">⟳</button>

<input
id="url"
type="text"
placeholder="Search or enter URL..."
class="flex-1 px-3 py-1 rounded bg-gray-700 outline-none"
/>

<button onclick="navigate()" class="px-3 py-1 bg-emerald-600 rounded">
Go
</button>

<button onclick="newTab()" class="px-3 py-1 bg-purple-600 rounded">
+
</button>

</div>

<!-- Tabs -->
<div id="tabs" class="flex gap-2 p-2 bg-gray-850 overflow-x-auto"></div>

<!-- Views -->
<div id="views" class="flex-1"></div>

</div>

<script type="module" src="/browser.js"></script>

</body>
</html>
