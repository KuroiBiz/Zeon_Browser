<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zeon Browser</title>

<style>
body {
  margin:0;
  font-family: system-ui;
}

#navbar {
  display:flex;
  padding:8px;
  background:#1e1e1e;
}

#url {
  flex:1;
  padding:6px;
}

#tabs {
  display:flex;
  background:#2b2b2b;
}

.tab {
  padding:8px 12px;
  cursor:pointer;
  color:white;
}

.tab.active {
  background:#444;
}

iframe {
  width:100%;
  height:calc(100vh - 80px);
  border:none;
  display:none;
}

iframe.active {
  display:block;
}
</style>
</head>

<body>

<div id="tabs"></div>

<div id="navbar">
<button onclick="newTab()">+</button>
<input id="url" placeholder="Enter URL"/>
<button onclick="go()">Go</button>
</div>

<div id="views"></div>

<script src="browser.js"></script>

</body>
</html>
