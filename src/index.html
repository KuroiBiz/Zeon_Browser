<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<title>Zeon Browser</title>

</head>

<body class="bg-zinc-900 text-white">

<div class="flex flex-col h-screen">

<div class="flex items-center gap-2 p-3 bg-zinc-800 shadow">

<button onclick="history.back()" class="px-3 py-1 bg-zinc-700 rounded hover:bg-zinc-600">
←
</button>

<button onclick="history.forward()" class="px-3 py-1 bg-zinc-700 rounded hover:bg-zinc-600">
→
</button>

<button onclick="reloadTab()" class="px-3 py-1 bg-zinc-700 rounded hover:bg-zinc-600">
⟳
</button>

<input
id="url"
placeholder="Search or type URL"
class="flex-1 px-4 py-2 rounded bg-zinc-700 outline-none focus:ring-2 ring-emerald-500"
/>

<button
onclick="navigate()"
class="px-4 py-2 bg-emerald-600 rounded hover:bg-emerald-500">
Go
</button>

</div>

<div class="flex-1 flex items-center justify-center text-zinc-400 text-lg">

WebView content loads here

</div>

</div>

<script type="module" src="/browser.js"></script>

</body>
</html>
