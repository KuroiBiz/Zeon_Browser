<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<title>Zeon Browser</title>

</head>

<body class="bg-zinc-900 text-white">

<div class="flex flex-col h-screen">

<div class="flex gap-2 p-3 bg-zinc-800">

<div id="tabs" class="flex gap-2 p-2 bg-zinc-850"></div>

<div id="views" class="flex-1"></div>

</div>

<script type="module" src="/src/browser.js"></script>

</body>
</html>
